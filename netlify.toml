[build]
  command   = "npm run build"
  publish   = "dist"

[functions]
  directory = "netlify/functions"

# -- Force www canonical domain (301 redirect) --------------------------------
# Netlify handles HTTP->HTTPS automatically (no rule needed for that).
# This rule ensures alzaydaninternational.com/* redirects to www.
[[redirects]]
  from   = "https://alzaydaninternational.com/*"
  to     = "https://www.alzaydaninternational.com/:splat"
  status = 301
  force  = true

# -- Dynamic Sitemap via Netlify Function ------------------------------------
# Must come BEFORE the SPA catch-all redirect below
[[redirects]]
  from   = "/sitemap.xml"
  to     = "/.netlify/functions/sitemap"
  status = 200

# -- SPA catch-all (React Router) --------------------------------------------
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# -- HTTP Headers for GEO & Security -----------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    Content-Language          = "en-AE"
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "SAMEORIGIN"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"

# -- Sitemap caching headers --------------------------------------------------
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400"

# -- Asset Caching for Performance -------------------------------------------
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
