[build]
  command   = "npm run build"
  publish   = "dist"

[functions]
  directory = "netlify/functions"

# -- Force www canonical domain (301 redirect) --------------------------------
# Netlify handles HTTP->HTTPS automatically (no rule needed for that).
# This rule ensures alzaydaninternational.com/* redirects to www.
[[redirects]]
  from   = "https://alzaydaninternational.com/*"
  to     = "https://www.alzaydaninternational.com/:splat"
  status = 301
  force  = true

# -- Dynamic Sitemap via Netlify Function ------------------------------------
# Must come BEFORE the SPA catch-all redirect below
[[redirects]]
  from   = "/sitemap.xml"
  to     = "/.netlify/functions/sitemap"
  status = 200

# -- Pre-rendered static HTML pages (product & static routes) -----------------
# These rules serve the static HTML files generated by scripts/prerender.cjs.
# They MUST come before the SPA catch-all redirect below.
# Netlify automatically serves /product/:id/index.html if the directory exists
# without these rules — but explicit rules ensure correct status codes.

[[redirects]]
  from   = "/product/:id"
  to     = "/product/:id/index.html"
  status = 200

[[redirects]]
  from   = "/about"
  to     = "/about/index.html"
  status = 200

[[redirects]]
  from   = "/contact"
  to     = "/contact/index.html"
  status = 200

[[redirects]]
  from   = "/rfq"
  to     = "/rfq/index.html"
  status = 200

[[redirects]]
  from   = "/blog"
  to     = "/blog/index.html"
  status = 200

[[redirects]]
  from   = "/search"
  to     = "/search/index.html"
  status = 200

[[redirects]]
  from   = "/solutions"
  to     = "/solutions/index.html"
  status = 200

[[redirects]]
  from   = "/traffic-safety-equipment-uae"
  to     = "/traffic-safety-equipment-uae/index.html"
  status = 200

[[redirects]]
  from   = "/road-safety-products-uae"
  to     = "/road-safety-products-uae/index.html"
  status = 200

[[redirects]]
  from   = "/reflective-sheeting-uae"
  to     = "/reflective-sheeting-uae/index.html"
  status = 200

[[redirects]]
  from   = "/packaging-materials-supplier-uae"
  to     = "/packaging-materials-supplier-uae/index.html"
  status = 200

# -- SPA catch-all (React Router) --------------------------------------------
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# -- HTTP Headers for GEO & Security -----------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    Content-Language          = "en-AE"
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "SAMEORIGIN"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"

# -- Sitemap caching headers --------------------------------------------------
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400"

# -- Asset Caching for Performance -------------------------------------------
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
